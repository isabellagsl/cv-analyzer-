</html><!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Analisador de Currículo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Analisador de Currículo</h1>
  <textarea id="curriculo" placeholder="Cole o texto do currículo aqui"></textarea>
  <button onclick="analisar()">Analisar</button>
  <div id="resultado"></div>

  <script>
    async function analisar() {
      const curriculo = document.getElementById("curriculo").value;
      const resultado = document.getElementById("resultado");

      if (!curriculo.trim()) {
        resultado.textContent = "Por favor, cole um currículo antes de analisar.";
        return;
      }

      resultado.textContent = "Analisando...";

      const response = await fetch("http://localhost:3000/analisar", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ curriculo })
      });

      const data = await response.json();
      resultado.textContent = data.resultado;
    }
  </script>

</body>
</html>
